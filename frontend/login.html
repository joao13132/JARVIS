<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. — Acesso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --cyan: #1de9d4;
    --dark: #02060a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--cyan);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-radial {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(29,233,212,0.08) 0%, transparent 55%), var(--dark);
  }

  .auth-box {
    position: relative;
    z-index: 10;
    width: 380px;
    background: rgba(2,12,16,0.65);
    border: 1px solid rgba(29,233,212,0.18);
    border-radius: 14px;
    padding: 40px 32px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 60px rgba(29,233,212,0.08);
  }

  .auth-logo {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 6px;
    text-align: center;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(29,233,212,0.5);
    margin-bottom: 6px;
  }
  .auth-sub {
    text-align: center;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(29,233,212,0.4);
    margin-bottom: 32px;
  }

  .tabs {
    display: flex;
    margin-bottom: 26px;
    border-bottom: 1px solid rgba(29,233,212,0.15);
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(29,233,212,0.4);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(29,233,212,0.5);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    background: rgba(29,233,212,0.04);
    border: 1px solid rgba(29,233,212,0.2);
    color: var(--cyan);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 11px 14px;
    border-radius: 6px;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .form-group input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 14px rgba(29,233,212,0.18);
  }

  .auth-btn {
    width: 100%;
    background: rgba(29,233,212,0.1);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 13px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
    transition: all .25s;
  }
  .auth-btn:hover {
    background: var(--cyan);
    color: var(--dark);
    box-shadow: 0 0 24px rgba(29,233,212,0.4);
  }
  .auth-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .auth-error {
    color: #ff6b6b;
    font-size: 11px;
    margin-top: 12px;
    text-align: center;
    min-height: 16px;
  }

  .form-panel { display: none; }
  .form-panel.active { display: block; }
</style>
</head>
<body>

<div class="bg-radial"></div>

<div class="auth-box">
  <div class="auth-logo">J.A.R.V.I.S.</div>
  <div class="auth-sub">SISTEMA DE ACESSO</div>

  <div class="tabs">
    <div class="tab active" data-tab="login">ENTRAR</div>
    <div class="tab" data-tab="cadastro">CADASTRAR</div>
  </div>

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>SENHA</label>
      <input type="password" id="loginSenha" placeholder="••••••••">
    </div>
    <button class="auth-btn" id="btnLogin">ACESSAR SISTEMA</button>
    <div class="auth-error" id="loginError"></div>
  </div>

  <!-- CADASTRO -->
  <div class="form-panel" id="panel-cadastro">
    <div class="form-group">
      <label>NOME</label>
      <input type="text" id="cadNome" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="cadEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>SENHA</label>
      <input type="password" id="cadSenha" placeholder="Mínimo 6 caracteres">
    </div>
    <button class="auth-btn" id="btnCadastro">CRIAR CONTA</button>
    <div class="auth-error" id="cadError"></div>
  </div>
</div>

<script>
  // troca de abas
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // LOGIN
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value.trim();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('btnLogin');

    if (!email || !senha) {
      errorEl.textContent = 'Preencha email e senha.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'ENTRANDO...';
    errorEl.textContent = '';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.detail || 'Erro ao entrar.';
        btn.disabled = false;
        btn.textContent = 'ACESSAR SISTEMA';
        return;
      }

      localStorage.setItem('jarvis_token', data.token);
      localStorage.setItem('jarvis_user', JSON.stringify(data));
      window.location.href = '/index.html';

    } catch (e) {
      errorEl.textContent = 'Erro de conexão com o servidor.';
      btn.disabled = false;
      btn.textContent = 'ACESSAR SISTEMA';
    }
  });

  // CADASTRO
  document.getElementById('btnCadastro').addEventListener('click', async () => {
    const nome = document.getElementById('cadNome').value.trim();
    const email = document.getElementById('cadEmail').value.trim();
    const senha = document.getElementById('cadSenha').value.trim();
    const errorEl = document.getElementById('cadError');
    const btn = document.getElementById('btnCadastro');

    if (!nome || !email || !senha) {
      errorEl.textContent = 'Preencha todos os campos.';
      return;
    }
    if (senha.length < 6) {
      errorEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'CRIANDO...';
    errorEl.textContent = '';

    try {
      const res = await fetch('/api/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.detail || 'Erro ao cadastrar.';
        btn.disabled = false;
        btn.textContent = 'CRIAR CONTA';
        return;
      }

      localStorage.setItem('jarvis_token', data.token);
      localStorage.setItem('jarvis_user', JSON.stringify(data));
      window.location.href = '/index.html';

    } catch (e) {
      errorEl.textContent = 'Erro de conexão com o servidor.';
      btn.disabled = false;
      btn.textContent = 'CRIAR CONTA';
    }
  });

  // Enter para submeter
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const activePanel = document.querySelector('.form-panel.active');
        activePanel.querySelector('.auth-btn').click();
      }
    });
  });

  // se já estiver logado, vai direto pro Jarvis
  if (localStorage.getItem('jarvis_token')) {
    window.location.href = '/index.html';
  }
</script>
</body>
</html>
